name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_api:
        description: "Build API"
        type: boolean
        default: false
      build_worker:
        description: "Build Worker"
        type: boolean
        default: false
      build_web:
        description: "Build Web"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      api_version: ${{ steps.api_version.outputs.version }}
      worker_version: ${{ steps.worker_version.outputs.version }}
      web_version: ${{ steps.web_version.outputs.version }}
      api_changed: ${{ steps.api_version.outputs.changed }}
      worker_changed: ${{ steps.worker_version.outputs.changed }}
      web_changed: ${{ steps.web_version.outputs.changed }}
      force_api: ${{ steps.force.outputs.force_api }}
      force_worker: ${{ steps.force.outputs.force_worker }}
      force_web: ${{ steps.force.outputs.force_web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: force
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "force_api=${{ github.event.inputs.build_api }}" >> $GITHUB_OUTPUT
            echo "force_worker=${{ github.event.inputs.build_worker }}" >> $GITHUB_OUTPUT
            echo "force_web=${{ github.event.inputs.build_web }}" >> $GITHUB_OUTPUT
          else
            echo "force_api=false" >> $GITHUB_OUTPUT
            echo "force_worker=false" >> $GITHUB_OUTPUT
            echo "force_web=false" >> $GITHUB_OUTPUT
          fi

      - id: api_version
        run: |
          CURRENT=$(grep -m1 '^version' backend/pyproject.toml | cut -d'=' -f2 | tr -d ' "')
          PREVIOUS=$(git show HEAD~1:backend/pyproject.toml 2>/dev/null | grep -m1 '^version' | cut -d'=' -f2 | tr -d ' "')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - id: worker_version
        run: |
          CURRENT=$(grep -m1 '^version' queue/pyproject.toml | cut -d'=' -f2 | tr -d ' "')
          PREVIOUS=$(git show HEAD~1:queue/pyproject.toml 2>/dev/null | grep -m1 '^version' | cut -d'=' -f2 | tr -d ' "')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - id: web_version
        run: |
          CURRENT=$(grep -m1 '"version"' frontend/package.json | cut -d':' -f2 | tr -d ' ,"')
          PREVIOUS=$(git show HEAD~1:frontend/package.json 2>/dev/null | grep -m1 '"version"' | cut -d':' -f2 | tr -d ' ,"')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build-api:
    needs: get-version
    if: needs.get-version.outputs.force_api == 'true' || needs.get-version.outputs.api_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          provenance: false
          sbom: false
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/elpitagoras14/aniseek-api:${{ needs.get-version.outputs.api_version }}
            ghcr.io/elpitagoras14/aniseek-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker:
    needs: get-version
    if: needs.get-version.outputs.force_worker == 'true' || needs.get-version.outputs.worker_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          provenance: false
          sbom: false
          context: ./queue
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/elpitagoras14/aniseek-worker:${{ needs.get-version.outputs.worker_version }}
            ghcr.io/elpitagoras14/aniseek-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: get-version
    if: needs.get-version.outputs.force_web == 'true' || needs.get-version.outputs.web_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          provenance: false
          sbom: false
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/elpitagoras14/aniseek-web:${{ needs.get-version.outputs.web_version }}
            ghcr.io/elpitagoras14/aniseek-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs:
      - build-api
      - build-worker
      - build-web
    if: |
      always() &&
      (
        needs.build-api.result == 'success' ||
        needs.build-worker.result == 'success' ||
        needs.build-web.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dokploy
        id: dokploy
        continue-on-error: true
        run: |
          curl -X 'POST' \
            'https://dokploy.elpitagoras14.xyz/api/compose.deploy' \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'x-api-key: ${{ secrets.DOKPLOY_API_KEY }}' \
            -d '{
              "composeId": "${{ vars.DOKPLOY_COMPOSE_ID }}",
              "title": "Deployment v${{ needs.get-version.outputs.api_version }}",
              "description": "Automatic deployment from GitHub Actions"
            }'

      - name: Deploy to Dokploy status check
        if: always()
        run: |
          echo "Dokploy deployment completed"
