version: "3.9"

services:
  # Development: Nginx proxy pointing to localhost services
  nginx:
    image: nginx:alpine
    container_name: "${COMPOSE_PROJECT_NAME}-nginx"
    ports:
      - "4000:80"
    volumes:
      # To use with web and api service running locally
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      # To use with all services in the compose.dev.yaml file
      # - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
    container_name: "${COMPOSE_PROJECT_NAME}-web"
    restart: unless-stopped
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    init: true
    expose:
      - "8000"
    environment:
      - API_PORT=8000
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - ANIMES_FOLDER=${ANIMES_FOLDER}
      - ACCESS_TOKEN_EXP_MIN=${ACCESS_TOKEN_EXP_MIN}
      - REFRESH_TOKEN_EXP_DAY=${REFRESH_TOKEN_EXP_DAY}
      - BRAVE_PATH=/usr/bin/brave-browser
    volumes:
      - ${DOCKER_DATA_FOLDER}/animes:${ANIMES_FOLDER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    container_name: "${COMPOSE_PROJECT_NAME}-api"
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1

  dramatiq-worker:
    build:
      context: ./queue
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - MAX_DOWNLOAD_RETRIES=${MAX_DOWNLOAD_RETRIES}
      - RETRY_DOWNLOAD_INTERVAL=${RETRY_DOWNLOAD_INTERVAL}
      - ANIMES_FOLDER=${ANIMES_FOLDER}
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DRAMATIQ_PROCESSES=${DRAMATIQ_PROCESSES}
      - DRAMATIQ_THREADS=${DRAMATIQ_THREADS}
      - BRAVE_PATH=/usr/bin/brave-browser
    volumes:
      - ${DOCKER_DATA_FOLDER}/animes:${ANIMES_FOLDER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    container_name: "${COMPOSE_PROJECT_NAME}-dramatiq"
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1

  postgres:
    image: postgres:18.1-bookworm
    ports:
      - "${POSTGRES_PORT:-4003}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    container_name: "${COMPOSE_PROJECT_NAME}-db"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
      timeout: 5s

  redis:
    image: redis:8.4.0-bookworm
    ports:
      - "${REDIS_PORT:-4004}:6379"
    container_name: "${COMPOSE_PROJECT_NAME}-redis"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
      timeout: 5s
