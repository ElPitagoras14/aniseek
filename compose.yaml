services:
  nginx:
    image: nginx:alpine
    container_name: "${COMPOSE_PROJECT_NAME}-nginx"
    ports:
      - "4000:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    image: ghcr.io/elpitagoras14/aniseek-web:latest
    pull_policy: always
    expose:
      - "3000"
    environment:
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
    container_name: "${COMPOSE_PROJECT_NAME}-web"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api:
    image: ghcr.io/elpitagoras14/aniseek-api:latest
    pull_policy: always
    init: true
    expose:
      - "8000"
    environment:
      - API_PORT=8000
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - ANIMES_FOLDER=${ANIMES_FOLDER}
      - ACCESS_TOKEN_EXP_MIN=${ACCESS_TOKEN_EXP_MIN}
      - REFRESH_TOKEN_EXP_DAY=${REFRESH_TOKEN_EXP_DAY}
      - BRAVE_PATH=/usr/bin/brave-browser
    volumes:
      - ${DOCKER_DATA_FOLDER}/animes:${ANIMES_FOLDER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    container_name: "${COMPOSE_PROJECT_NAME}-api"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dramatiq-worker:
    image: ghcr.io/elpitagoras14/aniseek-worker:latest
    pull_policy: always
    init: true
    environment:
      - REDIS_URL=redis://redis:6379
      - MAX_DOWNLOAD_RETRIES=${MAX_DOWNLOAD_RETRIES}
      - RETRY_DOWNLOAD_INTERVAL=${RETRY_DOWNLOAD_INTERVAL}
      - ANIMES_FOLDER=${ANIMES_FOLDER}
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DRAMATIQ_PROCESSES=${DRAMATIQ_PROCESSES}
      - DRAMATIQ_THREADS=${DRAMATIQ_THREADS}
      - BRAVE_PATH=/usr/bin/brave-browser
    volumes:
      - ${DOCKER_DATA_FOLDER}/animes:${ANIMES_FOLDER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    container_name: "${COMPOSE_PROJECT_NAME}-dramatiq"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "dramatiq"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:18.1-alpine
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    container_name: "${COMPOSE_PROJECT_NAME}-postgres"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
      timeout: 5s

  redis:
    image: redis:8.4.0-bookworm
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    container_name: "${COMPOSE_PROJECT_NAME}-redis"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
      timeout: 5s

volumes:
  postgres_data:
  redis_data:
